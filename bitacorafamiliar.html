<!DOCTYPE html>
<html lang="es">
<head>
  <title>Bitácora Familiar | Zoila y Máximo</title>
  <link rel="shortcut icon" href="images/family.png">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta property="og:image" content="images/family.png">

  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="fonts/icomoon/style.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/magnific-popup.css">
  <link rel="stylesheet" href="css/jquery-ui.css">
  <link rel="stylesheet" href="css/owl.carousel.min.css">
  <link rel="stylesheet" href="css/owl.theme.default.min.css">
  <link rel="stylesheet" href="css/lightgallery.min.css">
  <link rel="stylesheet" href="css/bootstrap-datepicker.css">
  <link rel="stylesheet" href="fonts/flaticon/font/flaticon.css">
  <link rel="stylesheet" href="css/swiper.css">
  <link rel="stylesheet" href="css/aos.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/bitacora.css">
</head>
<body>
  <div class="site-wrap">
    <div class="site-mobile-menu">
      <div class="site-mobile-menu-header">
        <div class="site-mobile-menu-close mt-3">
          <span class="icon-close2 js-menu-toggle"></span>
        </div>
      </div>
      <div class="site-mobile-menu-body"></div>
    </div>

    <header class="site-navbar py-3" role="banner">
      <div class="container-fluid">
        <div class="row align-items-center">
          <a href="index.html"><img src="images/family.png" alt="Zoila y Máximo" style="height:80px;object-fit:cover;object-position:50% 50%"></a>
        </div>
      </div>
    </header>

    <div class="container-fluid text-center" data-aos="fade" data-aos-delay="500">
      <p>&nbsp;</p>
      <h1>BITÁCORA FAMILIAR</h1>
      <p>Este espacio es para subir comentarios, mensajes, fotos o videos para toda la familia.</p>
      <p>&nbsp;</p>

      <form id="mensajeForm" class="bitacora-form" enctype="multipart/form-data">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" required>
        <br>
        <label for="mensaje">Mensaje:</label>
        <textarea rows="4" cols="50" id="mensaje" required></textarea>
        <br>
        <label for="archivo">Adjuntar archivo (imagen o video):</label>
        <input type="file" id="archivo" accept="image/*,video/*">
        <br>
        <button type="button" id="enviarMensajeBtn">Enviar mensaje</button>
      </form>
    </div>

    <div class="container" id="lightgallery">
      <div class="row" id="galleryRow"></div>
    </div>
  </div>

  <script src="js/jquery-3.3.1.min.js"></script>
  <script src="js/jquery-migrate-3.0.1.min.js"></script>
  <script src="js/jquery-ui.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/owl.carousel.min.js"></script>
  <script src="js/jquery.stellar.min.js"></script>
  <script src="js/jquery.countdown.min.js"></script>
  <script src="js/jquery.magnific-popup.min.js"></script>
  <script src="js/bootstrap-datepicker.min.js"></script>
  <script src="js/swiper.min.js"></script>
  <script src="js/aos.js"></script>
  <script src="js/picturefill.min.js"></script>
  <script src="js/lightgallery-all.min.js"></script>
  <script src="js/jquery.mousewheel.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/bitacora.js"></script>
</body>
</html>
